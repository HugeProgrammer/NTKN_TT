<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ảnh Ngẫu Nhiên ❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* === TỐI ƯU MOBILE: CHỐNG TRÀN VIỀN NGANG === */
        body, html {
            overflow-x: hidden; 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        /* CSS căn giữa video */
        #centralVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            max-width: 90vw; /* Tăng xíu cho mobile dễ nhìn */
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
            z-index: 10;
            object-fit: cover;
        }

        #rain-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        #popup {
            z-index: 100;
        }

        /* === CSS BẢNG CÂU HỎI === */
        #decisionOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75); 
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200; 
            font-family: Arial, sans-serif;
            backdrop-filter: blur(5px);
        }

        #decisionOverlay h2 {
            color: white;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #e91e63;
            text-align: center;
            padding: 0 10px;
        }

        .btn-container {
            position: relative;
            width: 90%; /* Đổi thành % để vừa mọi điện thoại */
            max-width: 320px;
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn-decision {
            padding: 12px 25px; /* Giảm nhẹ để vừa mobile */
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            /* Chống double-tap zoom trên iOS */
            touch-action: manipulation; 
        }

        #btnAgree {
            background-color: #ff4081;
            color: white;
        }

        #btnDecline {
            background-color: #e0e0e0;
            color: #333;
            position: absolute; 
            right: 10px;
            transition: all 0.1s; 
        }
    </style>
</head>
<body>

<video id="centralVideo" src="./img/video.mp4" autoplay controls playsinline disablePictureInPicture controlsList="nofullscreen nodownload noremoteplayback"></video>

    <div id="rain-container"></div>

    <div id="decisionOverlay">
        <h2>Cho anh được làm người yêu em nha? ❤️</h2>
        <div class="btn-container">
            <button id="btnAgree" class="btn-decision">Đồng ý</button>
            <button id="btnDecline" class="btn-decision">Từ chối</button>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close-button" id="closePopupButton">&times;</span>
            <img id="popupImg" src="" alt="Ảnh phóng to">
            <p id="popupMessage" class="popup-message"></p>
        </div>
    </div>

<script>
    const popup = document.getElementById('popup');
    const popupImg = document.getElementById('popupImg');
    const rainContainer = document.getElementById('rain-container');
    const centralVideo = document.getElementById('centralVideo'); 
    const closePopupButton = document.getElementById('closePopupButton');

    const decisionOverlay = document.getElementById('decisionOverlay');
    const btnAgree = document.getElementById('btnAgree');
    const btnDecline = document.getElementById('btnDecline');
    let hasShownDecision = false;

    let imageTimer = null;
    let flowerTimer = null;
    const imageUrls = [
        './img/1.jpg', './img/2.jpg', './img/3.jpg', './img/4.jpg',
        './img/5.jpg', './img/6.jpg', './img/7.jpg', './img/8.jpg',
        './img/9.jpg', './img/10.jpg', './img/11.jpg', './img/12.jpg',
        './img/13.jpg', './img/14.jpg', './img/15.jpg', './img/16.jpg',
        './img/17.jpg', './img/18.jpg', './img/19.jpg'    
    ];

    // === HIỆN BẢNG CÂU HỎI KHI VIDEO KẾT THÚC LẦN ĐẦU ===
    centralVideo.addEventListener('ended', () => {
        if (!hasShownDecision) {
            hasShownDecision = true;
            decisionOverlay.style.display = 'flex'; 
        }
    });

    // === NÚT TỪ CHỐI BỎ CHẠY ===
    function moveDeclineButton(e) {
        if (e) e.preventDefault(); 
        btnDecline.style.position = 'fixed';
        
        // Tối ưu để nút không văng ra khỏi rìa màn hình điện thoại
        const maxX = window.innerWidth - btnDecline.offsetWidth - 15; 
        const maxY = window.innerHeight - btnDecline.offsetHeight - 15;
        
        const randomX = Math.floor(Math.random() * maxX) + 5;
        const randomY = Math.floor(Math.random() * maxY) + 5;
        
        btnDecline.style.left = randomX + 'px';
        btnDecline.style.top = randomY + 'px';
    }

    btnDecline.addEventListener('mouseover', moveDeclineButton);
    btnDecline.addEventListener('touchstart', moveDeclineButton, { passive: false });
    btnDecline.addEventListener('click', moveDeclineButton);


    // === BẤM ĐỒNG Ý & MEGA HAPPY ENDING ===
    btnAgree.addEventListener('click', () => {
        decisionOverlay.style.display = 'none';
        centralVideo.loop = true;
        centralVideo.play();
        triggerMegaHappyEnding();
    });

    function triggerMegaHappyEnding() {
        // 1. Bom tim nổ (Giảm xuống 100 để máy yếu không giật)
        for (let i = 0; i < 100; i++) { 
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖', '💕', '💘', '💗', '💓'][Math.floor(Math.random() * 5)];
                heart.style.position = 'fixed';
                heart.style.left = '50%';
                heart.style.top = '50%';
                heart.style.fontSize = (Math.random() * 30 + 15) + 'px'; 
                heart.style.zIndex = '9999';
                heart.style.pointerEvents = 'none'; 
                heart.style.transition = 'all 2.5s cubic-bezier(0.25, 1, 0.5, 1)';
                document.body.appendChild(heart);
                
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * (window.innerWidth * 0.6) + 40; 
                
                setTimeout(() => {
                    heart.style.transform = `translate(${Math.cos(angle) * radius}px, ${Math.sin(angle) * radius}px) scale(0) rotate(${Math.random() * 720}deg)`; 
                    heart.style.opacity = '0';
                }, 50);
                setTimeout(() => heart.remove(), 2500);
            }, i * 10); 
        }

        // 2. Mưa pháo giấy
        const colors = ['#ff4081', '#00e5ff', '#ffeb3b', '#76ff03', '#e040fb', '#ffffff'];
        let confettiInterval = setInterval(() => {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-20px';
            confetti.style.width = (Math.random() * 8 + 4) + 'px';
            confetti.style.height = (Math.random() * 16 + 8) + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.zIndex = '9998';
            confetti.style.borderRadius = (Math.random() > 0.5) ? '50%' : '0'; 
            confetti.style.opacity = Math.random() + 0.5;
            confetti.style.transition = `top ${Math.random() * 3 + 2}s linear, transform ${Math.random() * 3 + 2}s linear`;
            document.body.appendChild(confetti);
            
            setTimeout(() => {
                confetti.style.top = '110vh'; 
                confetti.style.transform = `rotate(${Math.random() * 720}deg)`;
            }, 50);
            setTimeout(() => confetti.remove(), 5000);
        }, 50);

        // 3. Chữ I LOVE YOU 3000 căn giữa chuẩn
        setTimeout(() => {
            const text = document.createElement('div'); 
            text.innerHTML = "Yêu bé nhiều lắm luôn á! ❤️"; 
            
            text.style.position = 'fixed';
            text.style.left = '50%';
            text.style.transform = 'translateX(-50%)'; 
            text.style.width = '90%'; // Đảm bảo vừa màn hình đt
            text.style.textAlign = 'center';
            // Bỏ nowrap để chữ có thể xuống dòng nếu đt quá nhỏ
            text.style.wordWrap = 'break-word'; 
            
            text.style.top = '50%'; 
            text.style.color = '#fff';
            text.style.fontWeight = 'bold';
            text.style.fontSize = 'clamp(1.8rem, 6vw, 4rem)'; // Co giãn siêu tốt
            text.style.fontFamily = 'Arial, sans-serif';
            text.style.textShadow = '0 0 10px #ff4081, 0 0 20px #ff4081, 0 0 40px #ff4081, 0 0 80px #ff4081';
            text.style.zIndex = '10000';
            text.style.opacity = '0';
            text.style.pointerEvents = 'none';
            text.style.transition = 'opacity 2.5s ease-in-out, top 2.5s ease-out';
            text.style.background = 'transparent';
            
            document.body.appendChild(text);
            
            setTimeout(() => {
                text.style.opacity = '1';
                text.style.top = '8%'; // Bay lên trên video
            }, 100);
            
        }, 1500); 
        setTimeout(() => {
            window.location.href = 'hopdong.html';
        }, 4000);
    }


    // === CÁC CHỨC NĂNG ẢNH VÀ HOA RƠI ===
    function createRandomImage() {
        const img = document.createElement('img');
        img.src = imageUrls[Math.floor(Math.random() * imageUrls.length)];
        img.classList.add('random-image');
        
        // Giới hạn max 70vw để ảnh không tràn ra ngoài lề phải
        img.style.left = `${Math.random() * 70 + 5}vw`;
        img.style.top = `${25 + Math.random() * 50}vh`;
        img.style.cursor = "pointer";

        img.addEventListener('click', () => {
            stopEffects(); 
            popupImg.src = img.src;
            popup.classList.add('active');
        });

        rainContainer.appendChild(img);
        setTimeout(() => img.remove(), 3500);
    }

    function spawnFlower() {
        const f = document.createElement('div');
        f.className = 'flower';
        const icons = ['🌸', '💖', '❤️'];
        const icon = icons[Math.floor(Math.random() * icons.length)];
        f.textContent = icon;
        f.style.left = (Math.random()*90)+'%'; // Giữ lại 1 chút lề
        f.style.animationDuration = `${5 + Math.random()*6}s`;
        f.style.fontSize = `${12 + Math.random()*18}px`;
        f.style.position = 'absolute';
        f.style.zIndex = '5'; 

        if (icon !== '🌸') f.style.color = '#e91e63';

        document.body.appendChild(f);
        setTimeout(()=>f.remove(), 11000);
    }

    function closePopup() {
        popup.classList.remove("active");
        startEffects(); 
    }

    popup.addEventListener("click", (e) => {
        if (e.target === popup) closePopup();
    });
    closePopupButton.addEventListener("click", closePopup);

    function startEffects() {
        if (!imageTimer) imageTimer = setInterval(createRandomImage, 400); // Giãn nhẹ tgian sinh ảnh
        if (!flowerTimer) flowerTimer = setInterval(spawnFlower, 150); 
    }

    function stopEffects() {
        clearInterval(imageTimer);
        clearInterval(flowerTimer);
        imageTimer = null;
        flowerTimer = null;
        rainContainer.innerHTML = '';
        const flowers = document.querySelectorAll('.flower');
        flowers.forEach(flower => flower.remove());
    }

    startEffects();

    // Mẹo lách luật Auto-play có tiếng
    document.body.addEventListener('click', () => {
        if (centralVideo.paused && !hasShownDecision) {
            centralVideo.play().catch(e => console.error("Lỗi phát:", e));
        }
    }, { once: true }); 
</script>
</body>
</html>
