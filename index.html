<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Có một bí mật dành cho bé 💌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            /* Background gradient ngọt ngào */
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 16px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.15);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .lock-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        input {
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #e91e63;
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.2);
        }

        .btn-submit {
            background: #e91e63;
            background: linear-gradient(90deg, #e91e63, #ff4081);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:active {
            transform: scale(0.95);
        }

        /* Tim bay lơ lửng ở background */
        .bg-heart {
            position: absolute;
            color: #ff80ab;
            opacity: 0.3;
            z-index: 1;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="background-hearts"></div>

    <div class="glass-card" id="loginCard">
        <div class="lock-icon" id="lockIcon">🔐</div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Trạm kiểm soát Trái Tim</h1>
        <p class="text-gray-500 mb-6 text-sm">Vui lòng nhập "Mật khẩu" để tiếp tục nhé bé ơi! 💕</p>

        <div class="relative mb-4">
            <input type="text" id="pwdInput" 
                   class="w-full px-5 py-3 rounded-xl border-2 border-pink-200 bg-white/50 text-center text-lg font-semibold text-gray-700 placeholder-gray-400"
                   placeholder="Nhập mật khẩu vào đây..."
                   autocomplete="off">
        </div>

        <p id="errorMsg" class="text-red-500 text-sm font-medium h-5 mb-4 opacity-0 transition-opacity duration-300">
            Sai ùi! Gợi ý: Ngày mình yêu nhau á 😜
        </p>

        <button id="submitBtn" class="btn-submit w-full py-3 rounded-xl text-white font-bold text-lg shadow-lg">
            Mở Khóa 🗝️
        </button>
    </div>

    <script>
        // === CÀI ĐẶT MẬT KHẨU TẠI ĐÂY ===
        // Bạn có thể đổi chữ "ngan" thành ngày tháng (vd: "0509") hoặc tên gọi ở nhà nhé!
        const SECRET_PASSWORD = "ngan"; 
        
        const pwdInput = document.getElementById('pwdInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const lockIcon = document.getElementById('lockIcon');
        const loginCard = document.getElementById('loginCard');

        function checkPassword() {
            // Lấy giá trị nhập vào, xóa khoảng trắng 2 đầu và đưa về chữ thường
            const enteredPassword = pwdInput.value.trim().toLowerCase();

            if (enteredPassword === SECRET_PASSWORD) {
                // NẾU ĐÚNG: Đổi icon, ẩn form, hiệu ứng thành công rồi chuyển trang
                lockIcon.textContent = "🔓";
                pwdInput.disabled = true;
                submitBtn.innerHTML = "Đang mở cửa... 💖";
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
                errorMsg.style.opacity = '0';

                // Rung nhẹ điện thoại (nếu hỗ trợ)
                if (navigator.vibrate) navigator.vibrate([50, 100, 50]);

                // Chuyển sang ngan.html sau 1.5 giây
                setTimeout(() => {
                    loginCard.style.transform = 'scale(0.8)';
                    loginCard.style.opacity = '0';
                    loginCard.style.transition = 'all 0.5s ease';
                    
                    setTimeout(() => {
                        window.location.href = 'ngan.html';
                    }, 500);
                }, 1000);

            } else {
                // NẾU SAI: Hiện thông báo lỗi và rung thẻ input
                errorMsg.style.opacity = '1';
                pwdInput.classList.add('shake');
                
                // Rung báo lỗi
                if (navigator.vibrate) navigator.vibrate(200);

                // Xóa class shake để có thể rung tiếp ở lần bấm sau
                setTimeout(() => {
                    pwdInput.classList.remove('shake');
                }, 400);
            }
        }

        // Bắt sự kiện click nút
        submitBtn.addEventListener('click', checkPassword);

        // Bắt sự kiện ấn phím Enter trên bàn phím điện thoại/PC
        pwdInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Tự động sinh tim bay làm nền
        function createBackgroundHearts() {
            const container = document.getElementById('background-hearts');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖', '💕', '🌸', '✨'][Math.floor(Math.random() * 4)];
                heart.className = 'bg-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                container.appendChild(heart);
            }
        }
        createBackgroundHearts();
    </script>
</body>
</html>
